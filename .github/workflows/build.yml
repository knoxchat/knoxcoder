name: Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      build_linux:
        description: Build Linux x64
        type: boolean
        default: true
      build_windows:
        description: Build Windows x64
        type: boolean
        default: true

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  VSCODE_ARCH: x64
  npm_config_arch: x64
  ELECTRON_SKIP_BINARY_DOWNLOAD: 1
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

jobs:
  build-linux:
    name: Linux x64
    if: github.event_name != 'workflow_dispatch' || inputs.build_linux
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            build/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Linux build dependencies
        run: |
          set -e
          ./build/azure-pipelines/linux/apt-retry.sh sudo apt-get update
          ./build/azure-pipelines/linux/apt-retry.sh sudo apt-get install -y \
            pkg-config \
            libxkbfile-dev \
            libkrb5-dev \
            libgbm1 \
            rpm \
            fakeroot \
            dpkg-dev

      - name: Build KnoxCoder (Linux)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash ./scripts/ci/build-linux.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: knoxcoder-linux-x64
          path: .build/ci-artifacts/linux-x64/
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Windows x64
    if: github.event_name != 'workflow_dispatch' || inputs.build_windows
    runs-on: windows-2022
    timeout-minutes: 180
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            build/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build KnoxCoder (Windows)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash ./scripts/ci/build-windows.sh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: knoxcoder-win32-x64
          path: .build/ci-artifacts/win32-x64/
          if-no-files-found: error
          retention-days: 14
